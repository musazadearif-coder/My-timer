<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Hybrid Digital Analog Clock</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        .container {
            display: flex;
            align-items: center;
            gap: 50px;
            padding: 20px;
        }
        .analog-clock {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 4px solid #ffffff;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }
        .hand {
            position: absolute;
            background-color: #ffffff;
            top: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 4px;
        }
        .hour-hand { width: 6px; height: 70px; margin-top: -70px; margin-left: -3px; }
        .minute-hand { width: 4px; height: 100px; margin-top: -100px; margin-left: -2px; }
        .second-hand { width: 2px; height: 110px; margin-top: -110px; margin-left: -1px; background-color: #ff4d4d; }
        .digital-container {
            text-align: center;
        }
        .time-wrapper {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 10px;
            font-family: 'DS-Digital', sans-serif;
        }
        .time {
            font-size: 160px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .seconds {
            font-size: 70px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            margin-left: 10px;
        }
        .date {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 32px;
            font-weight: 400;
            color: #ffffff;
            margin-top: 30px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="analog-clock">
            <div class="hand hour-hand" id="hour"></div>
            <div class="hand minute-hand" id="minute"></div>
            <div class="hand second-hand" id="second"></div>
        </div>

        <div class="digital-container">
            <div class="time-wrapper">
                <div class="time" id="digital-time">00:00</div>
                <div class="seconds" id="digital-seconds">00</div>
            </div>
            <div class="date" id="date-display"></div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const locale = navigator.language || 'ru-RU';

            const seconds = now.getSeconds();
            const minutes = now.getMinutes();
            const hours = now.getHours();

            // Аналоговые часы
            const secondDegrees = ((seconds / 60) * 360) + 90;
            const minuteDegrees = ((minutes / 60) * 360) + ((seconds/60)*6) + 90;
            const hourDegrees = ((hours / 12) * 360) + ((minutes/60)*30) + 90;

            document.getElementById('second').style.transform = `rotate(${secondDegrees}deg)`;
            document.getElementById('minute').style.transform = `rotate(${minuteDegrees}deg)`;
            document.getElementById('hour').style.transform = `rotate(${hourDegrees}deg)`;

            // Цифровые часы
            const timeOptions = { hour: '2-digit', minute: '2-digit' };
            let timeString = new Intl.DateTimeFormat(locale, timeOptions).format(now);
            
            document.getElementById('digital-time').textContent = timeString;
            document.getElementById('digital-seconds').textContent = String(seconds).padStart(2, '0');

            // Дата
            const dateOptions = { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' };
            let dateString = new Intl.DateTimeFormat(locale, dateOptions).format(now);

            dateString = dateString.charAt(0).toUpperCase() + dateString.slice(1);
            document.getElementById('date-display').textContent = dateString;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
