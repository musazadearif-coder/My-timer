<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Hybrid Clock</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        .main-container {
            display: flex;
            align-items: center;
            gap: 60px;
        }
        .analog-clock {
            width: 300px;
            height: 300px;
            position: relative;
        }
        .face-mark {
            position: absolute;
            width: 4px;
            height: 25px;
            background-color: #ffffff;
            top: 10px;
            left: 148px;
            transform-origin: center 140px;
        }
        .face-mark.minor {
            height: 12px;
            width: 2px;
            top: 15px;
            left: 149px;
            transform-origin: center 135px;
        }
        .hand {
            position: absolute;
            background-color: #ffffff;
            bottom: 50%;
            left: 50%;
            transform-origin: center bottom;
            border-radius: 4px;
        }
        .hour-hand { width: 8px; height: 80px; margin-left: -4px; z-index: 3; }
        .minute-hand { width: 6px; height: 120px; margin-left: -3px; z-index: 2; }
        .second-hand { width: 2px; height: 135px; margin-left: -1px; background-color: #ff4d4d; z-index: 1; }
        .center-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #ff4d4d;
            border-radius: 50%;
            top: 144px;
            left: 144px;
            z-index: 4;
