<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Clocks Pro Exact Copy</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        .main-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 70px;
            width: 100%;
            max-width: 950px;
            padding: 20px;
        }
        
        /* Аналоговые часы */
        .analog-clock {
            width: 320px;
            height: 320px;
            position: relative;
            flex-shrink: 0;
        }
        
        /* Двойные объёмные риски как на планшете */
        .face-mark {
            position: absolute;
            width: 6px;
            height: 28px;
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 40%, rgba(255,255,255,0.1) 100%);
            top: 0;
            left: calc(50% - 3px);
            transform-origin: center 160px;
            border-radius: 2px;
            box-shadow: inset 1px 0 1px rgba(255,255,255,0.5), -1px 0 1px rgba(0,0,0,0.4);
        }
        .face-mark.minor {
            height: 16px;
            width: 3px;
            left: calc(50% - 1.5px);
            background: linear-gradient(to bottom, #ffffff 0%, rgba(255,255,255,0.2) 100%);
        }

        /* Стрелки без центрального кружка */
        .hand {
            position: absolute;
            background-color: #ffffff;
            bottom: 50%;
            left: 50%;
            transform-origin: center bottom;
        }
        .hour-hand { 
            width: 8px; 
            height: 85px; 
            margin-left: -4px; 
            z-index: 3;
            border-radius: 4px 4px 0 0;
        }
        .minute-hand { 
            width: 5px; 
            height: 125px; 
            margin-left: -2.5px; 
            z-index: 2;
            border-radius: 3px 3px 0 0;
        }
        /* Тонкая красная секундная стрелка проходящая через центр */
        .second-hand { 
            width: 2px; 
            height: 140px; 
            margin-left: -1px; 
            background-color: #ff3b30; 
            z-index: 4;
            border-radius: 1px;
        }

        /* Цифровой блок */
        .digital-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .time-wrapper {
            display: flex;
            align-items: baseline;
            justify-content: flex-start;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
        }
        .time {
            font-size: 130px;
            color: #ffffff;
            line-height: 1;
            letter-spacing: 2px;
            width: 370px;
            text-align: right;
            padding-right: 15px;
        }
        .seconds {
            font-size: 60px;
            color: #ffffff;
            line-height: 1;
            width: 90px;
            text-align: left;
            font-weight: 500;
        }
        .date {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 30px;
            font-weight: 400;
            color: #ffffff;
            margin-top: 15px;
            letter-spacing: 1px;
            white-space: nowrap;
            width: 100%;
            text-align: left;
            padding-left: 15px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="analog-clock">
            <div class="hand hour-hand" id="hour"></div>
            <div class="hand minute-hand" id="minute"></div>
            <div class="hand second-hand" id="second"></div>
            
            <div class="face-mark" style="transform: rotate(0deg);"></div>
            <div class="face-mark minor" style="transform: rotate(30deg);"></div>
            <div class="face-mark minor" style="transform: rotate(60deg);"></div>
            <div class="face-mark" style="transform: rotate(90deg);"></div>
            <div class="face-mark minor" style="transform: rotate(120deg);"></div>
            <div class="face-mark minor" style="transform: rotate(150deg);"></div>
            <div class="face-mark" style="transform: rotate(180deg);"></div>
            <div class="face-mark minor" style="transform: rotate(210deg);"></div>
            <div class="face-mark minor" style="transform: rotate(240deg);"></div>
            <div class="face-mark" style="transform: rotate(270deg);"></div>
            <div class="face-mark minor" style="transform: rotate(300deg);"></div>
            <div class="face-mark minor" style="transform: rotate(330deg);"></div>
        </div>

        <div class="digital-container">
            <div class="time-wrapper">
                <span class="time" id="digital-time">00:00</span>
                <span class="seconds" id="digital-seconds">00</span>
            </div>
            <div class="date" id="date-display"></div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const locale = navigator.language || 'ru-RU';

            const hours24 = now.getHours();
            const hours12 = hours24 % 12;
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const ms = now.getMilliseconds();

            // Плавное движение без рывков
            const secondDegrees = (seconds * 6 + ms * 0.006);
            const minuteDegrees = (minutes * 6 + seconds * 0.1);
            const hourDegrees = (hours12 * 30 + minutes * 0.5);

            document.getElementById('second').style.transform = `rotate(${secondDegrees}deg)`;
            document.getElementById('minute').style.transform = `rotate(${minuteDegrees}deg)`;
            document.getElementById('hour').style.transform = `rotate(${hourDegrees}deg)`;

            // Вывод цифрового времени (часы и минуты зафиксированы в одном блоке)
            const hoursStr = String(hours24).padStart(2, '0');
            const minutesStr = String(minutes).padStart(2, '0');
            document.getElementById('digital-time').textContent = `${hoursStr}:${minutesStr}`;
            document.getElementById('digital-seconds').textContent = String(seconds).padStart(2, '0');

            // Вывод даты под локаль устройства
            const dateOptions = { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' };
            let dateString = new Intl.DateTimeFormat(locale, dateOptions).format(now);
            dateString = dateString.charAt(0).toUpperCase() + dateString.slice(1);
            document.getElementById('date-display').textContent = dateString;
        }

        setInterval(updateClock, 16); 
        updateClock();
    </script>
</body>
</html>
