<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Hybrid Clock</title>
    <link href="https://fonts.cdnfonts.com/css/seven-segment" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        .main-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 50px;
            width: 100%;
            max-width: 950px;
            padding: 20px;
        }
        .analog-clock {
            width: 260px;
            height: 260px;
            position: relative;
            flex-shrink: 0;
        }
        .face-mark {
            position: absolute;
            width: 6px;
            height: 28px;
            background-color: #ffffff;
            top: 0;
            left: calc(50% - 3px);
            transform-origin: center 130px;
            border-radius: 3px;
        }
        .hand {
            position: absolute;
            background-color: #ffffff;
            bottom: 50%;
            left: 50%;
            transform-origin: center bottom;
            border-radius: 4px 4px 2px 2px;
        }
        .hour-hand { 
            width: 6px; 
            height: 65px; 
            margin-left: -3px; 
            z-index: 2; 
        }
        .minute-hand { 
            width: 6px; 
            height: 95px; 
            margin-left: -3px; 
            z-index: 3; 
        }
        .second-hand { 
            width: 2px; 
            height: 110px; 
            margin-left: -1px; 
            background-color: #ff4d4d; 
            z-index: 4; 
            border-radius: 1px;
        }
        .digital-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
        }
        .time-wrapper {
            display: flex;
            align-items: baseline;
            justify-content: flex-start;
            font-family: 'Seven Segment', sans-serif;
        }
        .time {
            font-size: 135px;
            font-weight: normal;
            color: #ffffff;
            line-height: 0.9;
        }
        .seconds-block {
            display: inline-block;
            margin-left: 5px;
        }
        .seconds {
            font-size: 65px;
            font-weight: normal;
            color: #ffffff;
            line-height: 0.9;
        }
        .date {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 26px;
            font-weight: 400;
            color: #ffffff;
            margin-top: 20px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="analog-clock">
            <div class="hand hour-hand" id="hour"></div>
            <div class="hand minute-hand" id="minute"></div>
            <div class="hand second-hand" id="second"></div>
            
            <div class="face-mark" style="transform: rotate(0deg);"></div>
            <div class="face-mark" style="transform: rotate(30deg);"></div>
            <div class="face-mark" style="transform: rotate(60deg);"></div>
            <div class="face-mark" style="transform: rotate(90deg);"></div>
            <div class="face-mark" style="transform: rotate(120deg);"></div>
            <div class="face-mark" style="transform: rotate(150deg);"></div>
            <div class="face-mark" style="transform: rotate(180deg);"></div>
            <div class="face-mark" style="transform: rotate(210deg);"></div>
            <div class="face-mark" style="transform: rotate(240deg);"></div>
            <div class="face-mark" style="transform: rotate(270deg);"></div>
            <div class="face-mark" style="transform: rotate(300deg);"></div>
            <div class="face-mark" style="transform: rotate(330deg);"></div>
        </div>

        <div class="digital-container">
            <div class="time-wrapper">
                <span class="time" id="digital-time">00:00</span>
                <div class="seconds-block">
                    <span class="seconds" id="digital-seconds">00</span>
                </div>
            </div>
            <div class="date" id="date-display"></div>
        </div>
    </div>

    <script>
        var daysRu = ['воскресенье', 'понедельник', 'вторник', 'среда', 'четверг', 'пятница', 'суббота'];
        var daysEn = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];

        function zeroPad(num) {
            return num < 10 ? '0' + num : '' + num;
        }

        function updateClock() {
            var now = new Date();
            var hours24 = now.getHours();
            var hours12 = hours24 % 12;
            var minutes = now.getMinutes();
            var seconds = now.getSeconds();
            var ms = now.getMilliseconds();

            var secondDegrees = (seconds * 6 + ms * 0.006);
            var minuteDegrees = (minutes * 6 + seconds * 0.1);
            var hourDegrees = (hours12 * 30 + minutes * 0.5);

            document.getElementById('second').style.transform = 'rotate(' + secondDegrees + 'deg)';
            document.getElementById('minute').style.transform = 'rotate(' + minuteDegrees + 'deg)';
            document.getElementById('hour').style.transform = 'rotate(' + hourDegrees + 'deg)';

            var strHours = zeroPad(hours24);
            var strMinutes = zeroPad(minutes);
            var strSeconds = zeroPad(seconds);

            document.getElementById('digital-time').textContent = strHours + ':' + strMinutes;
            document.getElementById('digital-seconds').textContent = strSeconds;

            var day = zeroPad(now.getDate());
            var month = zeroPad(now.getMonth() + 1);
            var year = now.getFullYear();

            var userLang = (navigator.language || navigator.userLanguage || 'ru-RU').toLowerCase();
            var dayName = daysRu[now.getDay()];

            if (userLang.indexOf('en') !== -1) {
                dayName = daysEn[now.getDay()];
            }

            document.getElementById('date-display').textContent = dayName + ', ' + day + '.' + month + '.' + year;
        }

        setInterval(updateClock, 16); 
        updateClock();
    </script>
</body>
</html>
