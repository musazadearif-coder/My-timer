<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>True Digital Clock</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'DS-Digital', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        .digital-container {
            text-align: center;
            padding: 20px;
        }
        .time-wrapper {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 10px;
        }
        .time {
            font-size: 140px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }
        .seconds {
            font-size: 60px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            margin-left: 5px;
        }
        .date {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 24px;
            font-weight: 400;
            color: #ffffff;
            margin-top: 25px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="digital-container">
        <div class="time-wrapper">
            <div class="time" id="digital-time">00:00</div>
            <div class="seconds" id="digital-seconds">00</div>
        </div>
        <div class="date" id="date-display"></div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const locale = navigator.language || 'en-US';

            const seconds = now.getSeconds();

            const timeOptions = { hour: '2-digit', minute: '2-digit' };
            let timeString = new Intl.DateTimeFormat(locale, timeOptions).format(now);
            
            document.getElementById('digital-time').textContent = timeString;
            document.getElementById('digital-seconds').textContent = String(seconds).padStart(2, '0');

            const dateOptions = { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' };
            let dateString = new Intl.DateTimeFormat(locale, dateOptions).format(now);

            dateString = dateString.charAt(0).toUpperCase() + dateString.slice(1);
            document.getElementById('date-display').textContent = dateString;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
