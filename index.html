<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Digital ZenClock</title>

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;

            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        .digital-container {
            text-align: center;
        }
        .time-wrapper {
            display: flex;
            align-items: baseline;
            justify-content: center;
        }
        .time {
            font-size: 120px;
            font-weight: bold;
            letter-spacing: -2px;
        }
        .seconds {
            font-size: 50px;
            margin-left: 15px;
            font-weight: normal;
        }
        .date {
            font-size: 28px;
            margin-top: 20px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

        <div class="time-wrapper">
            <div class="time" id="digital-time">00:00</div>
            <div class="seconds" id="digital-seconds">00</div>
        </div>
        <div class="date" id="date-display"></div>
    </div>
